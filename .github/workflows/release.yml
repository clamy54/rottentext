# Release: push d'un tag v* -> build 3 OS -> release GitHub en draft.
# Les scripts du depot font tout le travail, ici on orchestre seulement.
# Repetition a blanc: Actions > release > Run workflow (artefacts, pas de release).
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# un seul run par ref; pas d'annulation en vol (release a moitie faite sinon)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # garde-fou: tag coherent avec RT_VERSION avant de bruler des minutes de build
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Extraire RT_VERSION et controler le tag
        id: ver
        run: |
          ver="$(sed -n "s/.*RT_VERSION = '\([^']*\)'.*/\1/p" src/uMain.pas | head -1)"
          [ -n "$ver" ] || { echo "RT_VERSION introuvable dans src/uMain.pas" >&2; exit 1; }
          if [ "$GITHUB_REF_TYPE" = "tag" ] && [ "$GITHUB_REF_NAME" != "v$ver" ]; then
            echo "tag $GITHUB_REF_NAME != v$ver (RT_VERSION): version pas montee ou tag mal nomme" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: guard
    # arm64. Pas macos-latest: l'image macos-26 refuse le mpkg FPC 3.2.2
    # (format bundle 2021), et le ld d'Xcode 16 (macos-15) segfault sur les
    # options de link de FPC 3.2.2. macos-14 = Xcode 15.4 par defaut, dont
    # le linker classique (-ld_classic) accepte ces options.
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Installer Lazarus 4.4 aarch64
        # pas setup-lazarus ici: sur macOS il ne pose que la variante x86_64
        # et l'app sortirait en Intel (Rosetta chez l'utilisateur). On installe
        # la distribution aarch64 officielle, memes fichiers SourceForge.
        # Le code gere aussi Lazarus 4.8 (uDarwinQuit, gardes lcl_fullversion);
        # on reste sur 4.4 car ce pipeline est eprouve avec cette version.
        run: |
          base="https://sourceforge.net/projects/lazarus/files/Lazarus%20macOS%20aarch64/Lazarus%204.4"
          curl -fsSL -o /tmp/fpc.dmg "$base/fpc-3.2.2.intelarm64-macosx.dmg/download"
          sudo hdiutil attach -noautoopen /tmp/fpc.dmg
          sudo installer -package "/Volumes/fpc-3.2.2.intelarm64-macosx/fpc-3.2.2-intelarm64-macosx.mpkg" -target /
          sudo hdiutil detach "/Volumes/fpc-3.2.2.intelarm64-macosx"
          # le ld moderne (ld-prime) segfault sur le -order_file emis par
          # FPC 3.2.2: on force le linker classique
          fcfg=/etc/fpc.cfg
          [ -f "$fcfg" ] || fcfg="$(find /etc /usr/local/etc -maxdepth 2 -name fpc.cfg 2>/dev/null | head -1)"
          [ -n "$fcfg" ] || { echo "fpc.cfg introuvable" >&2; exit 1; }
          echo "-k-ld_classic" | sudo tee -a "$fcfg" >/dev/null
          curl -fsSL -o /tmp/lazarus.zip "$base/lazarus-darwin-aarch64-4.4.zip/download"
          unzip -q /tmp/lazarus.zip -d "$HOME/laz"
          # la config portable du zip pointe /Developer/lazarus, inaccessible
          # (racine scellee SSV): on la fait pointer sur l'emplacement reel
          cfg="$HOME/laz/lazarus/config/environmentoptions.xml"
          [ -f "$cfg" ] || { echo "config du zip introuvable" >&2; ls "$HOME/laz" "$HOME/laz/lazarus" >&2; exit 1; }
          sed -i '' "s|/Developer/lazarus|$HOME/laz/lazarus|g" "$cfg"
          lb="$HOME/laz/lazarus/lazbuild"
          [ -x "$lb" ] || { echo "lazbuild introuvable dans le zip" >&2; exit 1; }
          sudo ln -sf "$lb" /usr/local/bin/lazbuild
          lazbuild --version
      - name: Construire RottenText.app (release, signature ad hoc)
        run: bash scripts/make-app.sh --release
      - name: Empaqueter le .dmg
        # sans permission TCC le Finder ne repond pas: le script expire au bout
        # de 30 s et livre un .dmg non style, prevu et pas bloquant
        run: bash dist/macos/make-dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/macos/build/RottenText-*.dmg
          if-no-files-found: error

  build-linux:
    needs: guard
    runs-on: ubuntu-latest  # amd64
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Installer Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: "4.4"  # 4.8 pas encore proposee par setup-lazarus
          with-cache: false  # le service de cache repond 400 et l'action saute alors le vrai telechargement
      - name: Dependances d'empaquetage
        # dpkg-shlibdeps (dpkg-dev) pour les Depends, imagemagick pour les icones
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev imagemagick
      - name: Compiler (release)
        run: bash scripts/build.sh --release
      - name: Empaqueter le .deb
        run: bash dist/linux/build-deb.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/linux/build/rottentext_*_amd64.deb
          if-no-files-found: error

  build-windows:
    needs: guard
    runs-on: windows-latest  # x64
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Installer Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: "4.4"  # 4.8 pas encore proposee par setup-lazarus
          with-cache: false  # le service de cache repond 400 et l'action saute alors le vrai telechargement
      - name: Verifier Inno Setup 6
        # preinstalle sur windows-latest, ceinture et bretelles si l'image change
        run: |
          if (-not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup -y --no-progress
          }
      - name: Compiler (release)
        run: ./scripts/build.ps1 -Release
      - name: Compiler l'installeur
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" dist\windows\rottentext.iss
      - name: Zipper l'installeur
        run: |
          $setup = Get-ChildItem dist\windows\output\RottenText-Setup-*.exe | Select-Object -First 1
          Compress-Archive -Path $setup.FullName -DestinationPath ($setup.FullName -replace '\.exe$', '.zip') -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: dist/windows/output/RottenText-Setup-*.zip
          if-no-files-found: error

  release:
    # publication seulement sur push de tag; un dispatch reste une repetition a blanc
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [guard, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG: ${{ github.ref_name }}
      VER: ${{ needs.guard.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true
      - name: Creer la release (draft) avec les 3 fichiers
        run: |
          ls -l assets
          notes="$(printf '%s\n\n%s' \
            "macOS: the app is ad-hoc signed, not notarized. Gatekeeper blocks the first launch: open the app once, then go to System Settings > Privacy & Security and click Open Anyway." \
            "Changes: https://github.com/${GH_REPO}/commits/${TAG}")"
          if gh release view "$TAG" >/dev/null 2>&1; then
            # relance apres echec: la release existe deja, on remplace les fichiers
            gh release upload "$TAG" assets/* --clobber
          else
            gh release create "$TAG" assets/* --draft --title "RottenText $VER" --notes "$notes"
          fi
